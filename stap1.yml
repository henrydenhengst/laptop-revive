---
- name: Hardware inventarisatie
  hosts: localhost
  connection: local
  # We zetten become hier uit voor het hele script
  become: no

  tasks:
    - name: dmidecode installeren (vereist sudo)
      apt:
        name: dmidecode
        state: present
        update_cache: yes
      # Alleen deze specifieke taak wordt uitgevoerd als root
      become: yes

    - name: Hardware info ophalen
      shell: |
        echo "HOSTNAME: $(hostname)"
        echo "DATUM/TIJD: $(date '+%Y-%m-%d %H:%M:%S')"
        echo "MERK: $(dmidecode -s system-manufacturer)"
        echo "MODEL: $(dmidecode -s system-product-name)"
        echo "SERIENUMMER: $(dmidecode -s system-serial-number)"
      register: hwinfo
      changed_when: false
      # Gebruik sudo voor dmidecode commando's
      become: yes

    - name: Opslaan in de home directory van henry
      copy:
        dest: "{{ ansible_env.HOME }}/hardware-info.txt"
        content: "{{ hwinfo.stdout }}"
        mode: '0644'
      # Deze taak draait als henry (geen become nodig)
